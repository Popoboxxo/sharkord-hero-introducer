# ---------------------------------------------------------------------------
# Sharkord Dev Stack – Hero Introducer Plugin
# ---------------------------------------------------------------------------
# Usage:
#   1. bun run build                          # build the plugin first
#   2. docker compose -f docker-compose.dev.yml up
#   3. docker logs hero-introducer-dev -f     # watch logs / grab access token
#   4. docker compose -f docker-compose.dev.yml down
#
# After plugin changes:
#   bun run build
#   docker compose -f docker-compose.dev.yml restart sharkord
# ---------------------------------------------------------------------------

services:
  sharkord:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: hero-introducer-dev
    ports:
      - "4991:4991/tcp"                        # Sharkord Web UI
      - "40000:40000/tcp"                      # mediasoup signaling
      - "40000:40000/udp"                      # mediasoup RTP media
    volumes:
      # Mount the built plugin into Sharkord's plugins directory
      - ./dist/sharkord-hero-introducer:/home/bun/.config/sharkord/plugins/sharkord-hero-introducer
      # Persistent data (DB, user data, etc.)
      - sharkord-data:/home/bun/.config/sharkord
      # Mount test music files directly into the plugin's music directory
      - ./tests/test_music:/home/bun/.config/sharkord/plugins/sharkord-hero-introducer/music
    environment:
      - NODE_ENV=development
      - LOG_LEVEL=debug
    cap_add:
      - SYS_NICE                              # mediasoup worker thread priority
    restart: unless-stopped

volumes:
  sharkord-data:
